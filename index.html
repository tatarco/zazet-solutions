<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zazet Solutions</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand: #1a1a2e;
      --accent: #e94560;
      --light: #f5f5f7;
      --muted: #8a8a9a;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--brand);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #fff;
      padding: 2rem;
    }

    .card {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .logo-mark {
      width: 64px;
      height: 64px;
      background: var(--accent);
      border-radius: 16px;
      margin: 0 auto 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -1px;
      color: #fff;
      box-shadow: 0 0 40px rgba(233,69,96,0.35);
    }

    h1 {
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
    }

    h1 span {
      color: var(--accent);
    }

    .tagline {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .badge {
      display: inline-block;
      background: rgba(233,69,96,0.12);
      border: 1px solid rgba(233,69,96,0.3);
      color: var(--accent);
      padding: 0.4rem 1rem;
      border-radius: 100px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: rgba(255,255,255,0.1);
      margin: 2rem auto;
    }

    .domain {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.04em;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 30px rgba(233,69,96,0.25); }
      50% { box-shadow: 0 0 60px rgba(233,69,96,0.5); }
    }

    .logo-mark { animation: pulse 3s ease-in-out infinite; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-mark">ZS</div>
    <div class="badge">Coming Soon</div>
    <h1>Zazet <span>Solutions</span></h1>
    <p class="tagline">Something great is being built.<br>Check back soon.</p>
    <div class="divider"></div>
    <p class="domain">zazet-solutions.hr</p>
  </div>
</body>
</html>
