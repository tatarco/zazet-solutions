<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Potvrda rezervacije · ZaZet Solutions</title>
  <meta name="robots" content="noindex">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0d0d1a; color: #f0f0f5;
      min-height: 100svh; display: flex; align-items: center; justify-content: center;
      padding: 2rem;
    }
    .card {
      text-align: center; max-width: 480px;
      background: #111828; border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px; padding: 3rem 2.5rem;
    }
    .check {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, #3a90f0, #1a60d8);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.75rem;
      box-shadow: 0 8px 28px rgba(26,96,216,.4);
    }
    h1 { font-size: 1.55rem; font-weight: 800; letter-spacing: -.02em; margin-bottom: .75rem; }
    p  { font-size: .92rem; color: rgba(240,240,245,.6); line-height: 1.65; }
    .back {
      display: inline-flex; align-items: center; gap: .4rem;
      margin-top: 2.25rem; font-size: .85rem; font-weight: 600;
      color: #7ac8ff; text-decoration: none;
      transition: gap .15s;
    }
    .back:hover { gap: .6rem; }
  </style>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('consent','default',{analytics_storage:'denied',ad_storage:'denied',ad_user_data:'denied',ad_personalization:'denied',wait_for_update:500});
    function loadAnalytics(lang) {
      if (window.__analyticsLoaded) return;
      window.__analyticsLoaded = true;
      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://www.googletagmanager.com/gtag/js?id=G-Q0JMCN6F5T';
      document.head.appendChild(s);
      s.onload = function() {
        gtag('js', new Date());
        gtag('config', 'G-Q0JMCN6F5T', { interface_language: lang || 'hr' });
      };
    }
    function trackBookingConfirmed(lang, params) {
      try {
        if (localStorage.getItem('analyticsConsent') !== 'granted') return;
        gtag('consent', 'update', { analytics_storage: 'granted' });
        loadAnalytics(lang);
        gtag('event', 'book_call_confirmed', Object.assign({ interface_language: lang || 'hr' }, params || {}));
      } catch (e) {}
    }
  </script>
</head>
<body>
  <div class="card" id="card" hidden>
    <div class="check">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1 id="title"></h1>
    <p id="body"></p>
    <a href="https://zazet-solutions.hr/" class="back" id="back"></a>
  </div>
  <script>
    (function() {
      var q = new URLSearchParams(location.search);
      var uid = q.get('uid');
      var email = q.get('email');
      var startTime = q.get('startTime');
      var title = q.get('title') || '';
      var hasBooking = !!(uid || (email && startTime));

      if (!hasBooking) {
        location.replace('/#contact');
        return;
      }

      var lang = (q.get('lang') || localStorage.getItem('langPref') || 'hr').slice(0, 2);
      if (lang !== 'en' && lang !== 'hr') lang = 'hr';

      var copy = {
        hr: {
          title: 'Rezervacija potvrđena!',
          body: 'Vidimo se uskoro. Detalji su poslani na vašu email adresu.<br><br>Do tada — ako imate pitanja, slobodno mi pišite na WhatsApp ili email.',
          back: '← Povratak na ZaZet Solutions'
        },
        en: {
          title: 'Booking confirmed!',
          body: 'See you soon. Details have been sent to your email.<br><br>Until then — if you have questions, feel free to reach out on WhatsApp or email.',
          back: '← Back to ZaZet Solutions'
        }
      }[lang];

      document.documentElement.lang = lang;
      document.title = copy.title + ' · ZaZet Solutions';
      document.getElementById('title').textContent = copy.title;
      document.getElementById('body').innerHTML = copy.body;
      document.getElementById('back').textContent = copy.back;
      document.getElementById('card').hidden = false;

      trackBookingConfirmed(lang, {
        cal_uid: uid || '',
        booking_source: 'booked_page',
        event_type: title
      });
    })();
  </script>
</body>
</html>
